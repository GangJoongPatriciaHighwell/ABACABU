<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIM KYEONG JOONG - CYBER PORTFOLIO</title>
    <style>
        /* ------------------ 사이버펑크 변수 및 기본 설정 ------------------ */
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-yellow: #ffff00;
            --text-main: #e6f1ff;
        }

        body, h1, h2, ul, li, p { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* ------------------ 전체 배경 움짤 설정 ------------------ */
        body { 
            font-family: 'Orbitron', sans-serif; 
            color: var(--text-main); 
            
            /* 핵심: va11halla 움짤을 배경 전체로 쫙 깝니다 */
            background-image: url('va11halla.gif');
            background-size: cover; /* 화면을 꽉 채우도록 비율 조정 */
            background-position: center top; /* 윗부분 글씨가 잘리지 않게 상단 기준 정렬 */
            background-attachment: fixed; /* 스크롤해도 배경 움짤은 제자리에 고정 */
            background-repeat: no-repeat;
            background-color: #050a14; /* 만약의 경우를 위한 대체 배경색 */
            
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 배경 전체에 어두운 오버레이 & 스캔라인 씌우기 (글씨 가독성 확보) */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5, 10, 20, 0.6); /* 움짤 위에 반투명 검은색을 살짝 덮음 */
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.2), rgba(0,0,0,0.2) 2px, transparent 2px, transparent 4px);
            pointer-events: none; /* 클릭 방해 안 하게 설정 */
            z-index: -1;
        }

        /* ------------------ 메인 컨테이너 ------------------ */
        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            margin-top: 12vh; /* 화면 중앙쯤에 자연스럽게 배치되도록 여백 */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 100px;
        }

        /* ------------------ 프로필 & 이미지 영역 ------------------ */
        .profile-row {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 40px;
            width: 100%;
        }

        /* 프로필 카드 (배경이 비치는 유리 질감) */
        .profile-card {
            flex: 1;
            max-width: 600px;
            background-color: rgba(5, 10, 20, 0.7); /* 더 투명하게 해서 뒤에 움짤이 잘 비치게 함 */
            backdrop-filter: blur(12px); /* 강력한 블러 효과 */
            padding: 50px;
            border-radius: 15px;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .profile-card:hover {
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.5), inset 0 0 30px rgba(0, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .profile-card h2 {
            font-size: 2.5em;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            margin-bottom: 30px;
            border-bottom: 2px solid var(--neon-cyan);
            padding-bottom: 15px;
            letter-spacing: 2px;
        }

        .info-line {
            display: flex;
            margin-bottom: 20px;
            font-size: 1.2em;
        }
        .info-label {
            color: var(--neon-yellow);
            font-weight: bold;
            width: 120px;
            text-shadow: 0 0 5px var(--neon-yellow);
        }
        .info-value { color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.5); }

        /* 라쳇 이미지 카드 */
        .image-card {
            width: 350px;
            border-radius: 15px;
            border: 2px solid var(--neon-magenta);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
        }
        .image-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.6);
            border-color: var(--neon-cyan);
        }
        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .image-card::after { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(255,0,255,0.1), rgba(255,0,255,0.1) 1px, transparent 1px, transparent 3px);
            pointer-events: none;
        }

        /* ------------------ 과제(HOMEWORK) 메뉴 영역 ------------------ */
        .homework-section {
            width: 100%;
            max-width: 800px;
            margin-top: 60px;
            background-color: rgba(5, 10, 20, 0.7); /* 유리 질감 추가 */
            backdrop-filter: blur(10px);
            border: 1px solid var(--neon-cyan);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }

        .homework-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .homework-menu > li {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            transition: all 0.3s;
        }
        .homework-menu > li:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .homework-menu a, .hw-toggle-btn {
            display: block;
            padding: 15px 20px;
            color: #fff;
            text-decoration: none;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 0 0 5px var(--neon-cyan);
        }
        
        .hw-toggle-btn { display: flex; justify-content: space-between; }
        .hw-toggle-btn::after { content: '▼'; transition: transform 0.3s; }
        
        .sub-menu {
            list-style: none;
            max-height: 0; 
            overflow: hidden;
            transition: max-height 0.4s ease-in-out;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 0 0 8px 8px;
        }
        .sub-menu li { border-top: 1px solid rgba(0,255,255,0.1); }
        .sub-menu a { padding: 12px 30px; font-size: 1.1em; color: #aaa; text-shadow: none;}
        .sub-menu a:hover { color: var(--neon-magenta); text-shadow: 0 0 8px var(--neon-magenta); }

        .has-submenu.open .sub-menu { max-height: 300px; }
        .has-submenu.open .hw-toggle-btn::after { transform: rotate(-180deg); color: var(--neon-magenta); }

        /* ------------------ 반응형 설정 ------------------ */
        @media (max-width: 900px) {
            .main-wrapper { margin-top: 8vh; }
            .profile-row { flex-direction: column; align-items: center; }
            .profile-card, .image-card { width: 90%; max-width: none; }
            .image-card { height: auto; }
            .homework-section { width: 90%; }
        }
    </style>
