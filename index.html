<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIM KYEONG JOONG - CYBER PORTFOLIO</title>
    <style>
        /* ------------------ 사이버펑크 변수 및 기본 설정 ------------------ */
        :root {
            --bg-dark: #050a14; 
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-yellow: #ffff00;
            --text-main: #e6f1ff;
        }

        body, h1, h2, ul, li, p { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Orbitron', sans-serif; 
            background-color: var(--bg-dark); 
            /* 사이버펑크 그리드 배경 (GIF 아래 빈 공간을 채워줌) */
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px; 
            color: var(--text-main); 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ------------------ 1. 상단 배너 (원본 비율 100% 노출) ------------------ */
        .bg-gif-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 0;
            border-bottom: 3px solid var(--neon-magenta);
            box-shadow: 0 5px 30px rgba(255, 0, 255, 0.4);
        }

        /* 이미지 자체를 100% 너비로 맞춰서 절대 안 잘리게 만듦 */
        .bg-gif-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 배너 스캔라인 효과 */
        .bg-gif-container::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.2), rgba(0,0,0,0.2) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
        }

        /* ------------------ 메인 컨테이너 (정중앙 정렬) ------------------ */
        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            /* 화면 크기에 비례해서 마진을 줌 (GIF 중간쯤부터 덮도록) */
            margin-top: 15vw; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 100px;
        }

        /* ------------------ 2. 프로필 & 이미지 영역 ------------------ */
        .profile-row {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 40px;
            width: 100%;
        }

        /* 프로필 카드 */
        .profile-card {
            flex: 1;
            max-width: 600px;
            background-color: rgba(5, 10, 20, 0.85); /* 겹쳐도 글씨가 잘 보이게 어둡게 */
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 15px;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .profile-card:hover {
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.5), inset 0 0 30px rgba(0, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .profile-card h2 {
            font-size: 2.5em;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            margin-bottom: 30px;
            border-bottom: 2px solid var(--neon-cyan);
            padding-bottom: 15px;
            letter-spacing: 2px;
        }

        .info-line {
            display: flex;
            margin-bottom: 20px;
            font-size: 1.2em;
        }
        .info-label {
            color: var(--neon-yellow);
            font-weight: bold;
            width: 120px;
            text-shadow: 0 0 5px var(--neon-yellow);
        }
        .info-value { color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.5); }

        /* 라쳇 이미지 카드 */
        .image-card {
            width: 350px;
            border-radius: 15px;
            border: 2px solid var(--neon-magenta);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
        }
        .image-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.6);
            border-color: var(--neon-cyan);
        }
        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .image-card::after { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(255,0,255,0.1), rgba(255,0,255,0.1) 1px, transparent 1px, transparent 3px);
            pointer-events: none;
        }

        /* ------------------ 3. 과제(HOMEWORK) 메뉴 영역 ------------------ */
        .homework-section {
            width: 100%;
            max-width: 800px;
            margin-top: 60px;
            background-color: rgba(5, 10, 20, 0.85);
            border: 1px solid var(--neon-cyan);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
        }

        .homework-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .homework-menu > li {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            transition: all 0.3s;
        }
        .homework-menu > li:hover {
            background: rgba(0, 255, 255, 0.15);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .homework-menu a, .hw-toggle-btn {
            display: block;
            padding: 15px 20px;
            color: #fff;
            text-decoration: none;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 0 0 5px var(--neon-cyan);
        }
        
        /* HOMEWORK 2 드롭다운 설정 */
        .hw-toggle-btn { display: flex; justify-content: space-between; }
        .hw-toggle-btn::after { content: '▼'; transition: transform 0.3s; }
        
        .sub-menu {
            list-style: none;
            max-height: 0; 
            overflow: hidden;
            transition: max-height 0.4s ease-in-out;
            background: rgba(0, 0, 0, 0.5);
        }
        .sub-menu li { border-top: 1px solid rgba(0,255,255,0.1); }
        .sub-menu a { padding: 12px 30px; font-size: 1.1em; color: #aaa; text-shadow: none;}
        .sub-menu a:hover { color: var(--neon-magenta); text-shadow: 0 0 8px var(--neon-magenta); }

        .has-submenu.open .sub-menu { max-height: 300px; }
        .has-submenu.open .hw-toggle-btn::after { transform: rotate(-180deg); color: var(--neon-magenta); }

        /* ------------------ 반응형 (화면 작아질 때) ------------------ */
        @media (max-width: 900px) {
            .main-wrapper { margin-top: 100px; } /* 모바일에서는 마진 조정 */
            .profile-row { flex-direction: column; align-items: center; }
            .profile-card, .image-card { width: 90%; max-width: none; }
            .image-card { height: auto; }
            .homework-section { width: 90%; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-gif-container">
        <img src="va11halla.gif" alt="VA-11 Hall-A Background">
    </div>

    <div class="main-wrapper">
        <div class="profile-row">
            <div class="profile-card">
                <h2>KIM KYEONG JOONG</h2>
                <div class="info-line">
                    <span class="info-label">전공:</span>
                    <span class="info-value">컴퓨터공학전공</span>
                </div>
                <div class="info-line">
                    <span class="info-label">학년:</span>
                    <span class="info-value">2학년</span>
                </div>
                <div class="info-line">
                    <span class="info-label">이메일:</span>
                    <span class="info-value">rudwnd719@gmail.com</span>
                </div>
            </div>

            <div class="image-card">
                <img src="rachet.jpg" alt="Ratchet Image">
            </div>
        </div>

        <div class="homework-section">
            <ul class="homework-menu">
                <li><a href="https://sites.google.com/view/gangjoong/%ED%99%88" target="_blank">HOMEWORK 1</a></li>
                
                <li class="has-submenu" id="hw2-container">
                    <div class="hw-toggle-btn" id="hw2-btn">HOMEWORK 2</div>
                    <ul class="sub-menu">
                        <li><a href="hw2_1.html">2-1</a></li>
                        <li><a href="hw2_2.html">2-2</a></li>
                        <li><a href="hw2_3.html">2-3</a></li>
                        <li><a href="hw2_4.html">2-4</a></li>
                    </ul>
                </li>
                
                <li><a href="#">HOMEWORK 3</a></li>
                <li><a href="#">HOMEWORK 4</a></li>
            </ul>
        </div>
    </div>

    <script>
        const hw2Container = document.getElementById('hw2-container');
        const hw2Btn = document.getElementById('hw2-btn');
        
        hw2Btn.addEventListener('click', function() {
            hw2Container.classList.toggle('open');
        });
    </script>

</body>
</html>
